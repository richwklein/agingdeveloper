name: 'Build'

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Build artifact name'
        required: false
        type: string
        default: 'site-build'
      artifact-path:
        description: 'Path to upload as the build artifact'
        required: false
        type: string
        default: 'dist'
      checkout-ref:
        description: 'Git ref or SHA to checkout before building'
        required: false
        type: string
        default: ''
      retention-days:
        description: 'Days to retain the uploaded artifact'
        required: false
        type: number
        default: 7
      deploy-context:
        description: 'Deploy context used by the app to enable production-only behavior'
        required: false
        type: string
        default: 'deploy-preview'
    outputs:
      artifact-name:
        description: 'Uploaded artifact name'
        value: ${{ jobs.build.outputs.artifact-name }}
      artifact-path:
        description: 'Uploaded artifact path'
        value: ${{ jobs.build.outputs.artifact-path }}

permissions:
  contents: read

jobs:
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    env:
      ANALYTICS_TRACKING_ID: ${{ vars.ANALYTICS_TRACKING_ID }}
      DEPLOY_CONTEXT: ${{ inputs.deploy-context }}
      SITE_ORIGIN: ${{ vars.SITE_ORIGIN }}
    outputs:
      artifact-name: ${{ steps.artifact.outputs.artifact_name }}
      artifact-path: ${{ steps.artifact.outputs.artifact_path }}

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref != '' && inputs.checkout-ref || github.sha }}

      - name: 'Setup build tools'
        uses: ./.github/actions/setup-tools

      - name: 'Build project'
        run: pnpm run build

      - name: 'Record artifact metadata'
        id: artifact
        run: |
          echo "artifact_name=${{ inputs.artifact-name }}" >> "$GITHUB_OUTPUT"
          echo "artifact_path=${{ inputs.artifact-path }}" >> "$GITHUB_OUTPUT"

      - name: 'Upload build artifact'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}
