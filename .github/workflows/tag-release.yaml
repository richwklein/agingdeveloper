# Supersedes repo-template-astro's release-please.yaml: runs release-please then
# chains build → Netlify production deploy → Lighthouse on every release.
name: 'Tag Release'

on:
  push:
    branches:
      - main

jobs:
  release-please:
    name: 'Run release-please'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.release_created }}
      release_tag: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: 'Generate App token'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: 'Run release-please'
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: 'Output release info'
        env:
          RELEASED: ${{ steps.release.outputs.release_created }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: echo "released=$RELEASED tag=$RELEASE_TAG"

  code-build:
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/code-build.yaml
    with:
      artifact-name: release-build
      deploy-context: production
      checkout-ref: ${{ github.sha }}

  publish-release:
    name: 'Deploy Release'
    needs:
      - release-please
      - code-build
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    outputs:
      deploy_id: ${{ steps.deploy.outputs.deploy_id }}
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      logs_url: ${{ steps.deploy.outputs.logs_url }}
    permissions:
      contents: read

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: 'Setup deploy tools'
        uses: ./.github/actions/setup-tools

      - name: 'Download build artifact'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.code-build.outputs.artifact-name }}
          path: dist

      - name: 'Deploy production to Netlify'
        id: deploy
        env:
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          RELEASE_TAG: ${{ needs.release-please.outputs.release_tag }}
        run: |
          set -euo pipefail

          deploy_json="$(npx netlify deploy \
            --auth "$NETLIFY_API_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir dist \
            --message "Release $RELEASE_TAG" \
            --json \
            --no-build \
            --prod)"

          echo "$deploy_json"

          deploy_id="$(echo "$deploy_json" | jq -r '.deploy_id // .id // empty')"
          deploy_url="$(echo "$deploy_json" | jq -r '.deploy_url // .url // empty')"
          logs_url="$(echo "$deploy_json" | jq -r '.logs // empty')"

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Netlify production deploy did not return a deploy ID" >&2
            exit 1
          fi

          if [ -z "$deploy_url" ] || [ "$deploy_url" = "null" ]; then
            echo "Netlify production deploy did not return a deploy URL" >&2
            exit 1
          fi

          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "logs_url=$logs_url" >> "$GITHUB_OUTPUT"

  lighthouse:
    name: Lighthouse
    needs: publish-release
    permissions:
      contents: read
    if: needs.publish-release.result == 'success'
    uses: ./.github/workflows/code-lighthouse.yaml
    with:
      base-url: ${{ needs.publish-release.outputs.deploy_url }}
      checkout-ref: ${{ github.sha }}
      number-of-runs: 3
