name: 'Tag Release'

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-release:
    name: 'Tag on Release'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: 'Create GitHub release'
        id: 'release'
        uses: 'justincy/github-action-npm-release@2.0.2'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Output new tag'
        env:
          RELEASED: ${{ steps.release.outputs.released }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
        run: echo "released=$RELEASED tag=$RELEASE_TAG ($RELEASE_NAME)"

  code-build:
    needs: tag-release
    if: needs.tag-release.outputs.released == 'true'
    uses: ./.github/workflows/code-build.yaml
    with:
      artifact-name: release-build

  publish-release:
    name: 'Deploy Release'
    needs:
      - tag-release
      - code-build
    if: needs.tag-release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6

      - name: 'Setup deploy tools'
        uses: ./.github/actions/setup-tools
        with:
          install-dependencies: 'false'

      - name: 'Download build artifact'
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.code-build.outputs.artifact-name }}
          path: dist

      - name: 'Deploy production to Netlify'
        env:
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          RELEASE_TAG: ${{ needs.tag-release.outputs.release_tag }}
        run: |
          set -euo pipefail

          pnpm dlx netlify deploy \
            --auth "$NETLIFY_API_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir dist \
            --message "Release $RELEASE_TAG" \
            --json \
            --no-build \
            --prod
