name: 'Tag Release'

on:
  push:
    branches:
      - main

jobs:
  tag-release:
    name: 'Tag on Release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: 'Create GitHub release'
        id: 'release'
        uses: 'justincy/github-action-npm-release@2.0.2'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Output new tag'
        env:
          RELEASED: ${{ steps.release.outputs.released }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
        run: echo "released=$RELEASED tag=$RELEASE_TAG ($RELEASE_NAME)"

  code-build:
    needs: tag-release
    if: needs.tag-release.outputs.released == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/code-build.yaml
    with:
      artifact-name: release-build
      deploy-context: production
      checkout-ref: ${{ github.sha }}

  publish-release:
    name: 'Deploy Release'
    needs:
      - tag-release
      - code-build
    if: needs.tag-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    outputs:
      deploy_id: ${{ steps.deploy.outputs.deploy_id }}
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      logs_url: ${{ steps.deploy.outputs.logs_url }}
    permissions:
      contents: read

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: 'Setup deploy tools'
        uses: ./.github/actions/setup-tools

      - name: 'Download build artifact'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.code-build.outputs.artifact-name }}
          path: dist

      - name: 'Deploy production to Netlify'
        id: deploy
        env:
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          RELEASE_TAG: ${{ needs.tag-release.outputs.release_tag }}
        run: |
          set -euo pipefail

          deploy_json="$(pnpm exec netlify deploy \
            --auth "$NETLIFY_API_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir dist \
            --message "Release $RELEASE_TAG" \
            --json \
            --no-build \
            --prod)"

          echo "$deploy_json"

          deploy_url="$(echo "$deploy_json" | jq -r '.deploy_url // .url // empty')"
          logs_url="$(echo "$deploy_json" | jq -r '.logs // empty')"

          if [ -z "$deploy_url" ] || [ "$deploy_url" = "null" ]; then
            echo "Netlify production deploy did not return a deploy URL" >&2
            exit 1
          fi

          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "logs_url=$logs_url" >> "$GITHUB_OUTPUT

  lighthouse:
    name: Lighthouse
    needs: publish-release
    permissions:
      contents: read
      pull-requests: write
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/code-lighthouse.yaml
    with:
      base-url: ${{ needs.deploy.outputs.deploy_url }}
      pr-number: ${{ github.event.pull_request.number }}
      checkout-ref: ${{ github.event.pull_request.head.sha }}
      number-of-runs: 3
