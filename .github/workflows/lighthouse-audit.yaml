name: 'Lighthouse Audit'

on:
  workflow_call:
    inputs:
      base-url:
        description: 'Deployed site URL to audit'
        required: true
        type: string
      number-of-runs:
        description: 'How many Lighthouse runs to execute per URL'
        required: false
        type: number
        default: 1

jobs:
  lighthouse:
    name: 'Lighthouse'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
      LHCI_BUILD_CONTEXT__EXTERNAL_BUILD_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      LIGHTHOUSE_BASE_URL: ${{ inputs.base-url }}
      LIGHTHOUSE_NUMBER_OF_RUNS: ${{ inputs.number-of-runs }}

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6

      - name: 'Setup tools'
        uses: ./.github/actions/setup-tools
        with:
          install-dependencies: 'false'

      - name: 'Run Lighthouse CI'
        run: |
          pnpm dlx @lhci/cli@0.15.x autorun --config=.lighthouserc.cjs
