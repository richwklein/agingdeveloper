name: 'Setup Tools'
description: 'Setup Node.js and pnpm and optionally install project dependencies'

inputs:
  node-version-file:
    description: 'File used by actions/setup-node to determine the Node.js version'
    default: '.tool-versions'
  install-dependencies:
    description: 'Whether to install project dependencies'
    default: 'true'
  working-directory:
    description: 'Directory to run the pnpm install command from'
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: 'Setup pnpm'
      uses: pnpm/action-setup@v4
      with:
        package_json_file: ${{ inputs.working-directory }}/package.json
        run_install: false

    - name: 'Setup Node.js environment'
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: 'pnpm'
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: 'Install dependencies'
      if: ${{ inputs.install-dependencies != 'false' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
